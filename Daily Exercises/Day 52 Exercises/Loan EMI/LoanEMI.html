<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function calculateEMI(){
            let p = parseFloat(document.getElementById("a").value);
            let r = (parseFloat(document.getElementById("i").value)/12)/100;
            let n = parseFloat(document.getElementById("m").value);
            let emi = (p * r * Math.pow((1 + r), n)) / (Math.pow((1 + r), n) - 1);
            let balance = p;

            let body =document.getElementById("scheduleBody");
            body.innerHTML="";
            for(let i = 1; i <= n; i++){
                let interest = balance * r;
                let principal = emi - interest;
                let remaining = balance - principal;

                let row = `<tr>
                            <td>${i}</td>
                            <td>${balance.toFixed(2)}</td>
                            <td>${emi.toFixed(2)}</td>
                            <td>${principal.toFixed(2)}</td>
                            <td>${interest.toFixed(2)}</td>
                            <td>${remaining.toFixed(2)}</td>
                            </tr>`;

                body.innerHTML += row;

                balance = remaining;
            }

        }
    </script>
</head>
<body>
        <div class="container mt-4">
        <label class="form-label">Principal Amount:</label>
        <input type="number" class="form-control" id="a" ><br>
        <label class="form-label">Interest Rate:</label>
        <input type="number" class="form-control" id="i" ><br>
        <label class="form-label">No. Of Months:</label>
        <input type="number" class="form-control" id="m" ><br>
        <button class="btn btn-secondary" onclick="calculateEMI()">Calculate EMI</button>
        <br><br>

        
        <table class="table table-striped table-bordered table-hover text-center">
            <thead class="table-secondary">
                <tr>
                    <th>SNO</th>
                    <th>Loan Left</th>
                    <th>EMI</th>
                    <th>Principal</th>
                    <th>Interest</th>
                    <th>Remaining Balance</th>
                </tr>
            </thead>
            <tbody id="scheduleBody">
            </tbody>
        </table>
        </div>
    
</body>
</html>
